go:
  coverage:
    threshold: 85
  targets:
    - cmd
    - internal
  exclude:
    - "**/*_test.go"
    - "**/testdata/**"
    - pattern: "internal/syncer/service_other.go"
      reason: "non-Darwin launchd stub is not built in macOS CI coverage"
  dry:
    max_findings: 0
    paths:
      - cmd
      - internal
    exclude:
      - "**/*_test.go"
      - "**/testdata/**"
    structural:
      enabled: true
      threshold: 0.82
      min_lines: 4
      min_nodes: 20
    copied_blocks:
      enabled: true
      min_tokens: 100
  crap:
    max_score: 8
  mutation:
    targets:
      - internal/syncer
